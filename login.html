<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finanças do Miguel</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at top, #0d2818 0%, #0b0f14 60%);
    }
    .login-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 0 60px rgba(16,185,129,0.08), 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .login-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 0 30px rgba(16,185,129,0.4);
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f9fafb;
      text-align: center;
    }
    .login-subtitle {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: -16px;
      text-align: center;
    }
    .login-input-wrap {
      width: 100%;
      position: relative;
    }
    .login-input-wrap input {
      width: 100%;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      color: #f9fafb;
      padding: 14px 16px 14px 44px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .login-input-wrap input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16,185,129,0.15);
    }
    .login-input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #6b7280;
    }
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(16,185,129,0.45);
    }
    .login-btn:active { transform: translateY(0); }
    .login-error {
      color: #f87171;
      font-size: 0.82rem;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      width: 100%;
      text-align: center;
      display: none;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      75%{transform:translateX(6px)}
    }
    .login-hint {
      font-size: 0.75rem;
      color: #4b5563;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-bg">
    <div class="login-card">
      <div class="login-icon">🔐</div>
      <div>
        <div class="login-title">Finanças do Miguel</div>
        <div class="login-subtitle">Acesso protegido</div>
      </div>
      <div class="login-input-wrap">
        <span class="login-input-icon">🔑</span>
        <input type="password" id="senhaInput" placeholder="Digite sua senha"
               onkeydown="if(event.key==='Enter') entrar()"/>
      </div>
      <div class="login-error" id="loginErro">❌ Senha incorreta. Tente novamente.</div>
      <button class="login-btn" onclick="entrar()">Entrar</button>
      <div class="login-hint">Primeira vez? A senha padrão é <strong style="color:#10b981">1234</strong></div>
    </div>
  </div>
  <script>
    // Verifica se já está logado
    if (sessionStorage.getItem('logado') === 'sim') {
      window.location.href = 'index.html';
    }
    function entrar() {
      const senha = document.getElementById('senhaInput').value;
      const salva = localStorage.getItem('senhaMiguel') || '1234';
      const erro  = document.getElementById('loginErro');
      if (senha === salva) {
        sessionStorage.setItem('logado', 'sim');
        document.querySelector('.login-card').style.animation = 'fadeUp 0.3s ease reverse';
        setTimeout(() => window.location.href = 'index.html', 280);
      } else {
        erro.style.display = 'block';
        erro.style.animation = 'none';
        setTimeout(() => erro.style.animation = 'shake 0.3s ease', 10);
        document.getElementById('senhaInput').value = '';
      }
    }
  </script>
</body>
</html>
