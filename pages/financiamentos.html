<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Financiamentos - Miguel</title>
  <link rel="stylesheet" href="../style.css"/>
  <link rel="stylesheet" href="../pages.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">💰 Finanças do Miguel</div>
    <div class="nav-links">
      <a href="../index.html">Resumo</a>
      <a href="contas-fixas.html">Contas Fixas</a>
      <a href="compras.html">Compras</a>
      <a href="financiamentos.html" class="active">Financiamentos</a>
      <a href="investimentos.html">Investimentos</a>
    </div>
    <div class="nav-month" id="mesAtual"></div>
  </nav>

  <main class="container">

    <div class="page-header">
      <h1 class="page-title">💳 Financiamentos</h1>
      <span class="page-total" id="totalFinanc">Total Mensal: R$ 0,00</span>
    </div>

    <!-- FORMULÁRIO -->
    <div class="form-card">
      <h2 class="form-title">Adicionar Financiamento</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Nome do Bem</label>
          <input type="text" id="nomeFinanc" placeholder="Ex: Carro, Casa, Celular..."/>
        </div>
        <div class="form-group">
          <label>Valor Total (R$)</label>
          <input type="number" id="valorTotalFinanc" placeholder="0,00" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Valor da Parcela (R$)</label>
          <input type="number" id="parcelaFinanc" placeholder="0,00" step="0.01"/>
        </div>
        <div class="form-group">
          <label>Parcela Atual</label>
          <input type="number" id="parcelaAtual" placeholder="Ex: 3" min="1"/>
        </div>
        <div class="form-group">
          <label>Total de Parcelas</label>
          <input type="number" id="totalParcelas" placeholder="Ex: 48" min="1"/>
        </div>
        <div class="form-group">
          <label>Banco / Instituição</label>
          <input type="text" id="bancoFinanc" placeholder="Ex: Itaú, Nubank..."/>
        </div>
      </div>
      <button class="btn-primary" onclick="adicionarFinanciamento()">+ Adicionar</button>
    </div>

    <!-- CARDS DE FINANCIAMENTOS -->
    <div class="financ-grid" id="gridFinanciamentos">
      <p class="empty-msg">Nenhum financiamento cadastrado.</p>
    </div>

  </main>

  <script src="../app.js"></script>
  <script src="../pages.js"></script>
  <script>initFinanciamentos();</script>
</body>
</html>
